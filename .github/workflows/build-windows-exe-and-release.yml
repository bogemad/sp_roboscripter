name: Build Windows EXE and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Gooey pyinstaller

      - name: Make roboscripter and build executable with PyInstaller
        run: |
          python make_robotscripter.py sp_roboscripter_template_24-48-96.py sp_robotics_template_24-48-96.py sp_roboscripter_24-48-96.py && pyinstaller --onefile --windowed --name SPRoboscripter sp_roboscripter_24-48-96.py

      - name: Show build output
        run: |
          dir dist

      - name: Upload Windows EXE as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SPRoboscripter-Windows-exe
          path: dist/SPRoboscripter.exe
          if-no-files-found: error

      - name: Create GitHub Release and upload EXE
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "dist/SPRoboscripter.exe#SPRoboscripter.exe" `
            --title "${{ github.ref_name }}" `
            --generate-notes
